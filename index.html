<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practice 4 - Waymo Article</title>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <article class="article">
    <div class="article__image-container">
      <img src="./images/blog_image.png"
        alt="Waymo car" class="article__image">
    </div>

    <div class="article__body">
      <h2 class="article__title">
        Waymo Is A Trillion-Dollar Opportunity. Google Just Needs To Seize It
      </h2>

      <p class="article__text">
        The self-driving tech unit is expanding but if Alphabet pushed harder, Waymo could dominate a new market with
        the potential to generate more revenue than its ad business.
      </p>

      <div class="article__footer">
        <div class="article__author">
          <img src="./images/avatar_male.png" alt="Avatar" class="article__avatar">
          <div class="article__author-meta">
            <span class="article__author-name">Reznik Denis</span>
            <small class="article__date">01 Sept 2026</small>
          </div>
        </div>

        <div class="article__share-wrapper">
          <button class="article__share-btn" aria-label="Share this article">
            <i class="fas fa-share"></i>
          </button>

          <div class="article__social-popup">
            <span class="article__social-label">Share</span>
            <a href="#" class="article__social-link"><i class="fab fa-facebook-square"></i></a>
            <a href="#" class="article__social-link"><i class="fab fa-twitter"></i></a>
            <a href="#" class="article__social-link"><i class="fab fa-pinterest"></i></a>
          </div>
        </div>
      </div>
    </div>
  </article>

</body>

</html>
